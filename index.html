<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horn Generator</title>
    <style>
        :root {
            --bg-dark: #333333;
            --bg-light: #EBEBEB;
            --accent-white: #FFFFFF;
            --header-height: 60px;
            --footer-height: 150px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-dark);
            overflow: hidden; /* スクロール防止 */
        }

        /* 共通ヘッダー */
        .header {
            height: var(--header-height);
            border-bottom: 1px solid var(--accent-white);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            width: 100%;
        }
        .header h1 {
            color: var(--accent-white);
            font-size: 20px;
            margin: 0;
            font-weight: 500;
        }

        /* 画面管理 */
        .page {
            display: none;
            height: calc(100% - var(--header-height));
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            color: white;
        }
        .page.active { display: flex; }

        /* 1ページ目: Start画面 */
        #page-start .logo-container {
            text-align: center;
            margin-bottom: 50px;
        }
        .start-btn {
            background: var(--accent-white);
            color: black;
            padding: 15px 60px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.05); }

        /* 2ページ目: 選択画面 */
        .selection-container {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }
        .animal-card {
            text-align: center;
            cursor: pointer;
        }
        .animal-card img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            transition: 0.3s;
        }
        .animal-card:hover img { opacity: 0.8; }
        .animal-card p { margin-top: 15px; font-size: 1.1rem; }
        .instruction {
            text-decoration: underline;
            font-size: 0.9rem;
        }

        /* 3ページ目: ジェネレーター画面 */
        .canvas-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
        }
        .download-icon {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 40px;
            height: 40px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .controls-footer {
            height: var(--footer-height);
            background: var(--bg-light);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .param-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .arrow { cursor: pointer; font-size: 1.5rem; }

        .options-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .radio-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #ccc;
            cursor: pointer;
            background: white;
        }
        .radio-circle.selected {
            border-color: black;
            background: #666;
        }
        
        /* カラーマップ用 */
        #color-picker {
            width: 200px;
            height: 40px;
            border: 1px solid #000;
            background: linear-gradient(to right, red, yellow, green, cyan, blue, magenta, red);
            cursor: pointer;
        }

        .label-sm { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <header class="header">
        <h1>Horn Generator</h1>
    </header>

    <section id="page-start" class="page active">
        <div class="logo-container">
            <h2>TSUNO</h2>
            <p>Horn Generator Site</p>
        </div>
        <button class="start-btn" onclick="nav('page-select')">START</button>
    </section>

    <section id="page-select" class="page">
        <div class="selection-container">
            <div class="animal-card" onclick="startGen('スイギュウ')">
                <img src="https://via.placeholder.com/200?text=Buffalo" alt="スイギュウ">
                <p>スイギュウ</p>
            </div>
            <div class="animal-card" onclick="startGen('ヘラジカ')">
                <img src="https://via.placeholder.com/200?text=Moose" alt="ヘラジカ">
                <p>ヘラジカ</p>
            </div>
        </div>
        <p class="instruction">お好きな角を選択してください</p>
    </section>

    <section id="page-gen" class="page">
        <div class="canvas-area">
            <p>ここに３Dモデルが出る！</p>
            <div class="download-icon">↓</div>
        </div>

        <footer class="controls-footer">
            <div class="param-selector">
                <span class="arrow" onclick="prevParam()">←</span>
                <span id="param-title">長さ 1/5</span>
                <span class="arrow" onclick="nextParam()">→</span>
            </div>

            <div id="options-check" class="options-row">
                <span class="label-sm" id="label-left">短い</span>
                <div class="radio-circle" onclick="selectCircle(this)"></div>
                <div class="radio-circle" onclick="selectCircle(this)"></div>
                <div class="radio-circle" onclick="selectCircle(this)"></div>
                <div class="radio-circle" onclick="selectCircle(this)"></div>
                <div class="radio-circle selected" onclick="selectCircle(this)"></div>
                <span class="label-sm" id="label-right">長い</span>
            </div>

            <div id="options-color" class="options-row" style="display:none;">
                <div id="color-picker"></div>
                <p style="margin-left:10px; font-size: 0.8rem;">グラデーション設定可能</p>
            </div>
        </footer>
    </section>

    <script>
        let currentStep = 1;
        const params = [
            { name: "長さ", left: "短い", right: "長い" },
            { name: "曲がり", left: "弱い", right: "強い" },
            { name: "凹凸", left: "少ない", right: "多い" },
            { name: "分岐", left: "少ない", right: "多い" },
            { name: "色", left: "", right: "" }
        ];

        function nav(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function startGen(type) {
            nav('page-gen');
            console.log(type + "の生成を開始します");
        }

        function updateParamUI() {
            const data = params[currentStep - 1];
            document.getElementById('param-title').innerText = `${data.name} ${currentStep}/5`;
            
            if(currentStep === 5) {
                document.getElementById('options-check').style.display = 'none';
                document.getElementById('options-color').style.display = 'flex';
            } else {
                document.getElementById('options-check').style.display = 'flex';
                document.getElementById('options-color').style.display = 'none';
                document.getElementById('label-left').innerText = data.left;
                document.getElementById('label-right').innerText = data.right;
            }
        }

        function nextParam() {
            if(currentStep < 5) { currentStep++; updateParamUI(); }
        }

        function prevParam() {
            if(currentStep > 1) { currentStep--; updateParamUI(); }
        }

        function selectCircle(el) {
            document.querySelectorAll('.radio-circle').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }
    </script>
</body>
</html>
